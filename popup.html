<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中超赛程</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <span class="logo-icon">⚽</span>
      <span class="logo-text">中超联赛</span>
    </div>
    <div class="header-meta">
      <span class="data-source">ESPN</span>
      <span id="data-status" class="data-status">未更新</span>
      <button id="refresh" class="refresh-btn" type="button" title="刷新数据" aria-label="刷新数据">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15.5 9A6.5 6.5 0 1 1 9 2.5c1.8 0 3.4.73 4.6 1.9L11.5 6.5H16V2l-1.64 1.64A8 8 0 1 0 17 9h-1.5z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="main">
    <div class="tabs">
      <button class="tab-btn active" data-tab="schedule">赛程</button>
      <button class="tab-btn" data-tab="results">战绩</button>
      <button class="tab-btn" data-tab="standings">积分榜</button>
    </div>
    <div id="content" class="content"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
