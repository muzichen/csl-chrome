<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中超赛程 - 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .header-icon { font-size: 24px; }
    .header h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; }
    .header p { font-size: 13px; color: #888; }
    .divider { height: 1px; background: #f0f0f0; margin: 20px 0; }
    .section-title { font-size: 13px; font-weight: 600; color: #666; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .steps { list-style: none; counter-reset: steps; }
    .steps li {
      counter-increment: steps;
      padding: 8px 0 8px 32px;
      position: relative;
      font-size: 14px;
      color: #444;
      line-height: 1.5;
    }
    .steps li::before {
      content: counter(steps);
      position: absolute;
      left: 0;
      top: 8px;
      width: 20px;
      height: 20px;
      background: #D71A1E;
      color: white;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .steps a { color: #D71A1E; text-decoration: none; }
    .steps a:hover { text-decoration: underline; }
    label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 8px; }
    .input-row { display: flex; gap: 8px; }
    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #D71A1E; }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-primary { background: #D71A1E; color: white; }
    .btn-primary:hover { background: #b81519; }
    .btn-ghost { background: #f5f5f5; color: #666; }
    .btn-ghost:hover { background: #ebebeb; }
    .status {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.success { background: #f0faf4; color: #27ae60; display: block; }
    .status.error { background: #fef5f5; color: #c0392b; display: block; }
    .status.pending { background: #f5f5f5; color: #666; display: block; }
    .note {
      margin-top: 16px;
      padding: 12px 14px;
      background: #fffbf0;
      border: 1px solid #fde68a;
      border-radius: 8px;
      font-size: 13px;
      color: #92400e;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span class="header-icon">⚽</span>
      <div>
        <h1>中超赛程设置</h1>
        <p>配置 football-data.org API Key</p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-title">如何获取免费 API Key</div>
    <ol class="steps">
      <li>访问 <a href="https://www.football-data.org/client/register" target="_blank">football-data.org 注册页面</a></li>
      <li>填写邮箱注册免费账户</li>
      <li>登录后在控制台复制您的 API Token</li>
      <li>将 Token 粘贴到下方输入框并保存</li>
    </ol>

    <div class="divider"></div>

    <label for="api-key">API Key</label>
    <div class="input-row">
      <input type="text" id="api-key" placeholder="粘贴您的 API Key">
      <button class="btn btn-primary" id="save">保存</button>
      <button class="btn btn-ghost" id="clear">清除</button>
    </div>
    <div id="status" class="status"></div>

    <div class="note">
      ⚠️ 免费版每分钟限 10 次请求，数据每 10 分钟缓存一次。中超（CSL）数据需要确认您的账户有访问权限。
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
